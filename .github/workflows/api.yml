name: API Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run API tests
        run: npx playwright test tests/API/
